[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Redirect for our serverless email-sending endpoint
[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

# SPA Routing: Fallback all other client-side routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
